<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Container (Sign Up / Login) -->
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h1>To-Do List App</h1>
            
            <!-- Sign Up Form -->
            <div id="signupForm" class="form-section active">
                <h2>Sign Up</h2>
                <form onsubmit="handleSignUp(event)">
                    <input 
                        type="text" 
                        id="signupUsername" 
                        placeholder="Username" 
                        required
                        class="input-field"
                    >
                    <input 
                        type="email" 
                        id="signupEmail" 
                        placeholder="Email" 
                        required
                        class="input-field"
                    >
                    <input 
                        type="password" 
                        id="signupPassword" 
                        placeholder="Password" 
                        required
                        class="input-field"
                    >
                    <input 
                        type="password" 
                        id="signupConfirmPassword" 
                        placeholder="Confirm Password" 
                        required
                        class="input-field"
                    >
                    <button type="submit" class="auth-btn">Sign Up</button>
                </form>
                <p class="toggle-auth">
                    Already have an account? 
                    <a href="#" onclick="toggleAuthForms(event)">Login</a>
                </p>
                <div id="signupMessage" class="message"></div>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm" class="form-section">
                <h2>Login</h2>
                <form onsubmit="handleLogin(event)">
                    <input 
                        type="email" 
                        id="loginEmail" 
                        placeholder="Email" 
                        required
                        class="input-field"
                    >
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="Password" 
                        required
                        class="input-field"
                    >
                    <button type="submit" class="auth-btn">Login</button>
                </form>
                <p class="toggle-auth">
                    Don't have an account? 
                    <a href="#" onclick="toggleAuthForms(event)">Sign Up</a>
                </p>
                <div id="loginMessage" class="message"></div>
            </div>
        </div>
    </div>
    
    <!-- App Container (To-Do List) -->
    <div id="appContainer" class="app-container" style="display: none;">
        <div class="navbar">
            <h1>My To-Do List</h1>
            <div class="user-section">
                <span id="userDisplay" class="user-display"></span>
                <button id="signoutBtn" class="signout-btn">Sign Out</button>
            </div>
        </div>
        
        <div class="container">
            <div class="input-container">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..." 
                    class="task-input"
                >
                <button id="addBtn" class="add-btn">Add</button>
            </div>
            
            <ul id="taskList" class="task-list"></ul>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
